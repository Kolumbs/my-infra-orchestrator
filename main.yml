---
# Master playbook – provisions all managed devices.
# Run: ansible-playbook main.yml --ask-vault-pass

- name: Common Setup for all Pi servers
  hosts: servers
  become: true
  tasks:
    - name: Ensure common packages are installed
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
        name:
          - vim
          - curl
          - git
          - htop
        state: present

- name: Provision web servers
  hosts: web_server
  become: true
  tasks:
    - name: Ensure Apache package version constraint is defined
      ansible.builtin.assert:
        that:
          - apache_package_version is defined
          - (apache_package_version | string | length) > 0
        fail_msg: "apache_package_version must be set (for example: 2.4.67*)."

    - name: Install Apache package using version constraint
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
        name: "{{ apache_package_name }}={{ apache_package_version }}"
        state: present

    - name: Ensure Apache service is enabled and running
      ansible.builtin.service:
        name: "{{ apache_service_name }}"
        enabled: true
        state: started

- name: Provision GitHub Actions Runner (Pi)
  hosts: pi-server-1
  become: true
  roles:
    - role: monolithprojects.github_actions_runner
      vars:
        access_token: "{{ github_runner_registration_token }}"
        runner_org: true
        runner_user: "{{ ansible_user }}"
        runner_name: "pi-server-1"
        runner_labels:
          - self-hosted
          - Linux
          - ARM64
